<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>清輕妍美學 SPA | 線上預約系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #FDF8F3; -webkit-tap-highlight-color: transparent; }
        .font-serif { font-family: 'Noto Serif TC', serif; }
        .primary-color { color: #B4975A; }
        .bg-primary { background-color: #B4975A; }
        .booked-slot { background-color: #f3f4f6; color: #d1d5db; text-decoration: line-through; cursor: not-allowed; border: none !important; }
    </style>
</head>
<body class="text-stone-800 pb-20">

    <header class="bg-white border-b border-stone-200 py-6 px-4 text-center sticky top-0 z-50 shadow-sm">
        <h1 class="text-2xl font-serif tracking-widest primary-color">清輕妍美學 SPA</h1>
        <p class="text-[10px] text-stone-400 mt-1 uppercase tracking-[0.2em]">專業臉部管理 · 身體舒壓 · 採耳</p>
    </header>

    <!-- 載入動畫 (若卡住，10秒後會自動消失) -->
    <div id="loading-overlay" class="fixed inset-0 bg-white z-[100] flex items-center justify-center">
        <div class="text-center">
            <div class="inline-block w-8 h-8 border-4 border-[#B4975A] border-t-transparent rounded-full animate-spin"></div>
            <p class="text-xs text-stone-400 mt-4 tracking-widest">系統載入中...</p>
            <p class="text-[10px] text-stone-300 mt-2">若長時間未進入請檢查網路連線</p>
        </div>
    </div>

    <div id="app" class="max-w-md mx-auto mt-6 px-4">
        <div class="flex justify-between mb-8 px-2">
            <div class="flex flex-col items-center flex-1" id="p-1">
                <div class="w-7 h-7 rounded-full flex items-center justify-center text-xs mb-1 bg-primary text-white shadow-sm">1</div>
                <span class="text-[10px] text-stone-400">選擇項目</span>
            </div>
            <div class="flex flex-col items-center flex-1" id="p-2">
                <div class="w-7 h-7 rounded-full flex items-center justify-center text-xs mb-1 bg-stone-200 text-stone-500">2</div>
                <span class="text-[10px] text-stone-400">日期時間</span>
            </div>
            <div class="flex flex-col items-center flex-1" id="p-3">
                <div class="w-7 h-7 rounded-full flex items-center justify-center text-xs mb-1 bg-stone-200 text-stone-500">3</div>
                <span class="text-[10px] text-stone-400">資料確認</span>
            </div>
        </div>

        <div id="step-1" class="step-content">
            <h2 class="text-lg font-medium mb-4">選擇服務項目</h2>
            <div id="service-list" class="space-y-4"></div>
        </div>

        <div id="step-2" class="step-content hidden">
            <button onclick="goToStep(1)" class="text-xs text-stone-400 mb-4 flex items-center gap-1">← 返回選項目</button>
            <div class="bg-white p-6 rounded-2xl shadow-sm mb-4">
                <label class="block text-sm font-medium mb-3">選擇預約日期</label>
                <input type="date" id="date-picker" class="w-full p-4 bg-stone-50 rounded-xl border-none">
            </div>
            <div id="time-area" class="bg-white p-6 rounded-2xl shadow-sm hidden">
                <h2 class="text-sm font-medium mb-4">選擇預約時段</h2>
                <div id="time-grid" class="grid grid-cols-3 gap-2"></div>
                <button onclick="goToStep(3)" id="btn-to-3" class="w-full bg-primary text-white py-4 rounded-xl font-medium mt-6 hidden">下一步</button>
            </div>
        </div>

        <div id="step-3" class="step-content hidden">
            <button onclick="goToStep(2)" class="text-xs text-stone-400 mb-4">← 返回修改時間</button>
            <div class="bg-white p-6 rounded-2xl shadow-sm">
                <h2 class="text-lg font-medium mb-6">確認資訊</h2>
                <div class="bg-stone-50 p-4 rounded-xl mb-6 text-sm">
                    <div id="sum-name" class="font-bold mb-1"></div>
                    <div id="sum-time" class="primary-color"></div>
                </div>
                <input type="text" id="cust-name" placeholder="顧客姓名" class="w-full p-4 bg-stone-50 rounded-xl mb-4 text-sm">
                <input type="tel" id="cust-phone" placeholder="聯絡電話" class="w-full p-4 bg-stone-50 rounded-xl mb-4 text-sm">
                <button onclick="submitBooking()" id="submit-btn" class="w-full bg-primary text-white py-4 rounded-xl">送出預約</button>
            </div>
        </div>

        <div id="step-4" class="step-content hidden text-center py-12">
            <h2 class="text-xl font-bold mb-6">預約資料已發送！</h2>
            <button onclick="openLine()" class="w-full bg-[#06C755] text-white py-4 rounded-full font-bold">私訊 LINE 完成預約</button>
        </div>
    </div>

    <script>
        // --- 請將您的 Firebase Config 貼在這裡 ---
        let firebaseConfig;
        try {
            firebaseConfig = JSON.parse(__firebase_config);
        } catch (e) {
            // 如果在外部環境，請在此處貼上您的 Firebase 物件
            firebaseConfig = {
                apiKey: "您的API_KEY",
                authDomain: "您的DOMAIN",
                projectId: "您的PROJECT_ID",
                storageBucket: "您的BUCKET",
                messagingSenderId: "您的ID",
                appId: "您的APP_ID"
            };
        }

        const LINE_ID = "@314jacpw";
        const SERVICES = [
            { cat: '臉部管理', items: [{ name: '毛孔深呼吸淨化管理', dur: 60, price: 890 }, { name: '撥筋V臉緊緻管理', dur: 60, price: 1190 }] },
            { cat: '身體療程', items: [{ name: '頭肩頸釋壓放鬆', dur: 30, price: 800 }, { name: '背部三焦舒壓', dur: 60, price: 1300 }] },
            { cat: '採耳方案', items: [{ name: 'A. 小資採耳', dur: 30, price: 750 }, { name: 'B. 舒壓採耳', dur: 45, price: 900 }] }
        ];

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'spa-default';

        let state = { step: 1, service: null, date: '', time: '', bookedSlots: [] };

        async function init() {
            // 防卡死機制：10秒後強制關閉讀取畫面
            setTimeout(() => { document.getElementById('loading-overlay').style.display = 'none'; }, 10000);

            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await auth.signInWithCustomToken(__initial_auth_token);
                } else {
                    await auth.signInAnonymously();
                }
            } catch (e) { console.warn("Firebase Auth Error"); }

            const list = document.getElementById('service-list');
            SERVICES.forEach(cat => {
                let html = `<h3 class="text-xs font-bold text-stone-400 mt-4 border-l-2 border-primary pl-2 uppercase">${cat.cat}</h3>`;
                cat.items.forEach(i => {
                    html += `<button onclick="chooseService('${i.name}', ${i.dur})" class="w-full bg-white p-4 rounded-xl shadow-sm text-left flex justify-between mt-2">
                        <div><div class="text-sm font-medium">${i.name}</div><div class="text-[10px] text-stone-400">${i.dur}min</div></div>
                        <span class="text-stone-300">→</span></button>`;
                });
                list.innerHTML += html;
            });
            document.getElementById('date-picker').min = new Date().toISOString().split('T')[0];
            document.getElementById('loading-overlay').style.display = 'none';
        }

        function chooseService(name, dur) { state.service = { name, dur }; goToStep(2); }
        function goToStep(s) {
            state.step = s;
            document.querySelectorAll('.step-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(`step-${s}`).classList.remove('hidden');
            if (s === 3) {
                document.getElementById('sum-name').innerText = state.service.name;
                document.getElementById('sum-time').innerText = `${state.date} ${state.time}`;
            }
        }

        document.getElementById('date-picker').addEventListener('change', async (e) => {
            state.date = e.target.value;
            const snap = await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('bookings').where('date', '==', state.date).get();
            state.bookedSlots = snap.docs.map(doc => doc.data().time);
            renderTimes();
            document.getElementById('time-area').classList.remove('hidden');
        });

        function renderTimes() {
            const grid = document.getElementById('time-grid'); grid.innerHTML = '';
            for (let h = 10; h < 19; h++) {
                [":00", ":30"].forEach(m => {
                    const t = h.toString().padStart(2, '0') + m;
                    const isBooked = state.bookedSlots.includes(t);
                    const btn = document.createElement('button');
                    btn.innerText = t;
                    btn.className = isBooked ? "py-3 rounded-xl text-xs booked-slot" : "py-3 rounded-xl text-xs bg-white border border-stone-100";
                    if (!isBooked) {
                        btn.onclick = () => {
                            state.time = t;
                            document.querySelectorAll('#time-grid button').forEach(b => b.classList.remove('bg-primary', 'text-white'));
                            btn.classList.add('bg-primary', 'text-white');
                            document.getElementById('btn-to-3').classList.remove('hidden');
                        };
                    }
                    grid.appendChild(btn);
                });
            }
        }

        async function submitBooking() {
            const name = document.getElementById('cust-name').value;
            const phone = document.getElementById('cust-phone').value;
            if (!name || !phone) return alert('請填寫完整資訊');
            const ref = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('bookings').doc(`${state.date}_${state.time.replace(':','')}`);
            await ref.set({ name, phone, date: state.date, time: state.time, service: state.service.name });
            state.finalMsg = `預約確認：\n項目：${state.service.name}\n時間：${state.date} ${state.time}\n姓名：${name}`;
            goToStep(4);
        }

        function openLine() { window.location.href = `https://line.me/R/oaMessage/${LINE_ID}/?${encodeURIComponent(state.finalMsg)}`; }
        init();
    </script>
</body>
</html>
