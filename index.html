<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>清輕妍美學 SPA - 線上預約系統</title>
    <style>
        :root {
            --primary-color: #c5a880;
            --primary-light: #f4ebd9;
            --text-color: #5a4b3e;
            --bg-color: #faf7f2;
            --white: #ffffff;
            --gray-disabled: #e0e0e0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding: 20px 10px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: var(--white);
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            padding: 25px;
            border: 1px solid var(--primary-light);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--primary-light);
            padding-bottom: 20px;
        }

        .header h1 {
            font-size: 26px;
            color: var(--text-color);
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 12px;
            color: var(--primary-color);
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        .section-title {
            font-size: 16px;
            font-weight: bold;
            margin: 20px 0 10px 0;
            padding-left: 8px;
            border-left: 3px solid var(--primary-color);
            color: var(--text-color);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
        }

        input[type="text"], input[type="tel"], input[type="date"], select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            background-color: #fcfcfc;
            outline: none;
            transition: 0.3s;
        }

        input:focus, select:focus {
            border-color: var(--primary-color);
            background-color: var(--white);
        }

        .grid-items {
            display: grid;
            grid-template-columns: 100%;
            gap: 10px;
            max-height: 250px;
            overflow-y: auto;
            border: 1px solid #eee;
            padding: 10px;
            border-radius: 8px;
            background: #fafafa;
        }

        .item-option {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            background: var(--white);
            border: 1px solid #e8e8e8;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }

        .item-option:hover {
            border-color: var(--primary-color);
        }

        .item-option input {
            margin-right: 10px;
        }

        .item-info {
            flex-grow: 1;
            font-size: 14px;
        }

        .item-meta {
            text-align: right;
            font-size: 13px;
            color: #888;
        }

        .price {
            color: var(--text-color);
            font-weight: bold;
        }

        /* 時間格子樣式 */
        .time-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-top: 10px;
        }

        .time-slot {
            padding: 10px 5px;
            text-align: center;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            background-color: var(--white);
            transition: 0.2s;
        }

        .time-slot:hover:not(.disabled) {
            border-color: var(--primary-color);
            background-color: var(--primary-light);
        }

        .time-slot.selected {
            background-color: var(--primary-color);
            color: var(--white);
            border-color: var(--primary-color);
        }

        .time-slot.disabled {
            background-color: var(--gray-disabled);
            color: #999;
            cursor: not-allowed;
            border-color: #ddd;
            text-decoration: line-through;
        }

        /* 預約加總面板 */
        .summary-box {
            background: var(--primary-light);
            padding: 15px;
            border-radius: 8px;
            margin-top: 25px;
            font-size: 14px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }

        .summary-total {
            font-size: 16px;
            font-weight: bold;
            border-top: 1px dashed var(--primary-color);
            padding-top: 8px;
            margin-top: 8px;
        }

        .submit-btn {
            width: 100%;
            background-color: var(--text-color);
            color: var(--white);
            border: none;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
            letter-spacing: 1px;
        }

        .submit-btn:hover {
            background-color: #42362b;
        }

        .notice {
            font-size: 11px;
            color: #888;
            text-align: center;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>清輕妍美學 SPA</h1>
        <p>RELAX • RENEW • REJUVENATE</p>
    </div>

    <div class="form-group">
        <label for="custName">顧客姓名 *</label>
        <input type="text" id="custName" placeholder="請輸入您的姓名" required>
    </div>
    <div class="form-group">
        <label for="custPhone">聯絡電話 *</label>
        <input type="tel" id="custPhone" placeholder="請輸入手機號碼" required>
    </div>

    <div class="form-group">
        <label for="categorySelect">選擇療程類別 *</label>
        <select id="categorySelect" onchange="updateServiceList()">
            <option value="facial">Facial Care 臉部管理</option>
            <option value="body">Body Therapy 身體療程</option>
            <option value="ear">Ear Spa 採耳</option>
        </select>
    </div>

    <div class="form-group">
        <label>選擇主療程 (單選) *</label>
        <div class="grid-items" id="mainServiceList">
            </div>
    </div>

    <div class="form-group">
        <label>加購項目 (可多選)</label>
        <div class="grid-items" id="addonServiceList">
            </div>
    </div>

    <div class="form-group">
        <label for="bookingDate">預約日期 *</label>
        <input type="date" id="bookingDate" onchange="handleDateChange()" required>
    </div>

    <div class="form-group">
        <label>預約時間 (營業時間 10:00 - 16:00) *</label>
        <div class="time-grid" id="timeGrid">
            </div>
    </div>

    <div class="summary-box">
        <div class="summary-row">
            <span>預估總施作時間:</span>
            <span id="sumDuration">0 分鐘</span>
        </div>
        <div class="summary-row">
            <span>內含清潔與緩衝時間:</span>
            <span>30 分鐘</span>
        </div>
        <div class="summary-total summary-row">
            <span>預估合計金額:</span>
            <span id="sumPrice" class="price">$0</span>
        </div>
    </div>

    <button class="submit-btn" onclick="submitToLine()">確認預約並跳轉官方 LINE</button>
    <p class="notice">※ 點擊後將會開啟 LINE 傳送預約訊息，小編確認時段後即完成預約。</p>
</div>

<script>
    // 完整資料庫項目
    const servicesData = {
        facial: [
            { name: "毛孔深呼吸淨化管理", time: 60, price: 890 },
            { name: "撥筋V臉緊緻管理", time: 60, price: 1190 },
            { name: "深層淨化調理課程", time: 90, price: 1290 },
            { name: "杏仁酸煥膚管理", time: 90, price: 1390 },
            { name: "藍銅勝肽修護補水", time: 90, price: 1490 },
            { name: "EGF術後修護管理", time: 90, price: 1490 },
            { name: "水飛梭深層潔膚", time: 90, price: 1590 },
            { name: "MTS水光保濕管理", time: 90, price: 1690 },
            { name: "綠藻煥膚亮白管理", time: 90, price: 1790 },
            { name: "白藻高效煥膚管理", time: 90, price: 2590 }
        ],
        body: [
            { name: "頭肩頸釋壓放鬆", time: 30, price: 800 },
            { name: "美胸循環保養", time: 30, price: 990 },
            { name: "暖宮調理放鬆", time: 30, price: 990 },
            { name: "背部三焦舒壓", time: 60, price: 1300 },
            { name: "背部磁石排酸舒壓", time: 60, price: 1600 },
            { name: "全身經絡循環SPA", time: 90, price: 1950 },
            { name: "美背水飛梭護理", time: 90, price: 1590 },
            { name: "全身去角質護理", time: 120, price: 1890 },
            { name: "足部深層釋放", time: 50, price: 1790 }
        ],
        ear: [
            { name: "A. 小資採耳", time: 30, price: 750 },
            { name: "B. 舒壓採耳", time: 45, price: 900 },
            { name: "C. 薰香採耳", time: 60, price: 1100 },
            { name: "D. 舒眠採耳", time: 90, price: 1400 }
        ],
        addons: {
            face: [
                { name: "【加購面】小顏緊緻課程", time: 20, price: 590 },
                { name: "【加購面】臉部撥筋放鬆", time: 20, price: 590 },
                { name: "【加購面】淨白嫩膚課程", time: 10, price: 390 },
                { name: "【加購面】毛孔暢通課程", time: 20, price: 390 },
                { name: "【加購面】天鵝頸保養", time: 10, price: 490 },
                { name: "【加購面】保濕安瓶導入", time: 10, price: 290 },
                { name: "【加購面】光子嫩膚儀", time: 20, price: 290 }
            ],
            body: [
                { name: "【加購身】耳燭單次", time: 15, price: 490 },
                { name: "【加購身】刮痧", time: 20, price: 490 },
                { name: "【加購身】排酸毯", time: 40, price: 490 }
            ]
        }
    };

    // ==========================================
    // 💡 在這裡設定已被預約的日期和時間段！
    // ==========================================
    const bookedSlots = {
        "2026-05-20": ["10:30", "11:00", "14:00"],
        "2026-05-21": ["10:00", "15:30", "16:00"],
        "2026-05-25": ["13:00", "13:30"]
    };

    let selectedTime = "";

    // 初始化設定當天日期為最小可選日期
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('bookingDate').min = today;

    // 渲染主療程項目列表
    function updateServiceList() {
        const cat = document.getElementById('categorySelect').value;
        const container = document.getElementById('mainServiceList');
        container.innerHTML = "";

        servicesData[cat].forEach((item, index) => {
            container.innerHTML += `
                <div class="item-option" onclick="selectMainService('${cat}', ${index})">
                    <input type="radio" name="mainService" id="main_${index}" value="${item.name}" data-time="${item.time}" data-price="${item.price}">
                    <div class="item-info">
                        <strong>${item.name}</strong>
                    </div>
                    <div class="item-meta">
                        <div>${item.time} min</div>
                        <div class="price">$${item.price}</div>
                    </div>
                </div>
            `;
        });

        // 連動渲染加購項目
        const addonContainer = document.getElementById('addonServiceList');
        addonContainer.innerHTML = "";
        let addonType = (cat === 'facial') ? 'face' : 'body';
        
        servicesData.addons[addonType].forEach((item, index) => {
            addonContainer.innerHTML += `
                <div class="item-option" onclick="toggleAddon(${index})">
                    <input type="checkbox" name="addonService" id="addon_${index}" value="${item.name}" data-time="${item.time}" data-price="${item.price}" onclick="event.stopPropagation(); calculateTotal();">
                    <div class="item-info">
                        <span>${item.name}</span>
                    </div>
                    <div class="item-meta">
                        <div>${item.time} min</div>
                        <div class="price">$${item.price}</div>
                    </div>
                </div>
            `;
        });

        calculateTotal();
    }

    function selectMainService(cat, index) {
        document.getElementById(`main_${index}`).checked = true;
        calculateTotal();
    }

    function toggleAddon(index) {
        const chk = document.getElementById(`addon_${index}`);
        chk.checked = !chk.checked;
        calculateTotal();
    }

    // 計算總金額與總時間
    function calculateTotal() {
        let totalTime = 0;
        let totalPrice = 0;

        const mainRadio = document.querySelector('input[name="mainService"]:checked');
        if (mainRadio) {
            totalTime += parseInt(mainRadio.dataset.time);
            totalPrice += parseInt(mainRadio.dataset.price);
        }

        const addons = document.querySelectorAll('input[name="addonService"]:checked');
        addons.forEach(chk => {
            totalTime += parseInt(chk.dataset.time);
            totalPrice += parseInt(chk.dataset.price);
        });

        if (totalTime > 0) {
            document.getElementById('sumDuration').innerText = `${totalTime + 30} 分鐘 (含30min緩衝)`;
        } else {
            document.getElementById('sumDuration').innerText = `0 分鐘`;
        }
        document.getElementById('sumPrice').innerText = `$${totalPrice}`;
    }

    // 當日期變更時，重新生成可預約的時間格子
    function handleDateChange() {
        const dateInput = document.getElementById('bookingDate').value;
        const grid = document.getElementById('timeGrid');
        grid.innerHTML = "";
        selectedTime = "";

        // 營業時間調整為 10:00 至 16:00
        const startHour = 10;
        const endHour = 16;
        
        let slots = [];
        for(let h = startHour; h < endHour; h++) {
            slots.push(`${h}:00`);
            slots.push(`${h}:30`);
        }
        slots.push(`${endHour}:00`);

        const bookedToday = bookedSlots[dateInput] || [];

        slots.forEach(time => {
            const isDisabled = bookedToday.includes(time);
            const disabledClass = isDisabled ? 'disabled' : '';
            grid.innerHTML += `
                <div class="time-slot ${disabledClass}" data-time="${time}" onclick="selectTimeSlot(this, ${isDisabled})">
                    ${time}
                </div>
            `;
        });
    }

    function selectTimeSlot(element, isDisabled) {
        if (isDisabled) return;
        
        const active = document.querySelector('.time-slot.selected');
        if (active) active.classList.remove('selected');

        element.classList.add('selected');
        selectedTime = element.dataset.time;
    }

    // 送出資料至 LINE
    function submitToLine() {
        const name = document.getElementById('custName').value.trim();
        const phone = document.getElementById('custPhone').value.trim();
        const date = document.getElementById('bookingDate').value;
        const mainRadio = document.querySelector('input[name="mainService"]:checked');

        if (!name || !phone || !date || !mainRadio || !selectedTime) {
            alert("請填寫完整資訊（姓名、電話、主療程、日期及時間）！");
            return;
        }

        let mainServiceName = mainRadio.value;
        let addonsText = "";
        const addons = document.querySelectorAll('input[name="addonService"]:checked');
        addons.forEach(chk => {
            addonsText += `\n ➕ 加購：${chk.value}`;
        });
        if(!addonsText) addonsText = "\n ➕ 加購：無";

        const totalPrice = document.getElementById('sumPrice').innerText;
        const totalDuration = document.getElementById('sumDuration').innerText;

        const message = `✨【清輕妍美學 SPA 預約申請】✨\n\n` +
                        `👤 顧客姓名：${name}\n` +
                        `📞 聯絡電話：${phone}\n` +
                        `📅 預約日期：${date}\n` +
                        `⏰ 預約時間：${selectedTime}\n` +
                        `💆 預約項目：${mainServiceName}${addonsText}\n` +
                        `⏳ 預估時間：${totalDuration}\n` +
                        `💰 預估金額：${totalPrice}\n\n` +
                        `（送出此訊息後，請等待小編核對即完成預約哦！）`;

        const lineId = "@314jacpw"; 
        const encodedMessage = encodeURIComponent(message);
        const lineUrl = `https://line.me/R/oaMessage/${lineId}/?${encodedMessage}`;

        window.location.href = lineUrl;
    }

    updateServiceList();
</script>

</body>
</html>
const bookedSlots = {
    "2026-05-20": ["10:30", "11:00", "14:00"],
    "2026-05-21": ["10:00", "15:30", "16:00"],
    "2026-05-25": ["13:00", "13:30"]
};
</html>
